<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notion Word Widget</title>
  <link rel="stylesheet" href="words.css" />
</head>

<body>
  <div class="notion-widget">
    <div class="widget-header"><span class="sparkle">💕</span>&nbsp;&nbsp;Ett ord för dig&nbsp;<span
        class="sparkle">💕</span></div>

    <div class="cards">
      <!-- Single full-width Word card (front: Swedish, back: German + samples) -->
      <div class="flip-card" data-role="word" tabindex="0">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <div class="badge">Dagens ord</div>
            <div class="word">—</div>
            <div class="sample">—</div>
          </div>
          <div class="flip-card-back">
            <div class="badge">Deutsch</div>
            <div class="word">—</div>
            <div class="sample">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="media-row">
      <div class="image-placeholder">
        <img id="word-image" src="img/word-placeholder.svg" alt="placeholder image" />
      </div>
      <div class="controls">
        <div class="button-stack" style="display:flex;flex-direction:column;gap:8px">
          <button id="play-word" class="play">Hear it <span class="btn-heart">❤</span></button>
          <button id="reload-word" class="play" title="Reload" style="padding:8px 12px;display:flex;align-items:center;gap:8px"> 
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden>
              <path d="M21 12a9 9 0 10-2.6 6.1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 3v6h-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Reload
          </button>
        </div>
      </div>
    </div>

    <audio id="audio-player-word" preload="none"></audio>

    <script src="words.js"></script>
</body>

</html>
